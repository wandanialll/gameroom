name: Deploy to DigitalOcean

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_KEY_PASSPHRASE }}
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/gameroom"
            fi

            REPO_URL="${{ secrets.REPO_CLONE_URL }}"
            if [ -z "$REPO_URL" ]; then
              REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              if [ -n "$(ls -A "$APP_DIR" 2>/dev/null)" ]; then
                echo "APP_DIR exists but is not a git repo: $APP_DIR"
                ls -la "$APP_DIR"
                exit 1
              fi
              echo "First deploy: cloning $REPO_URL into $APP_DIR"
              git clone --branch master "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            echo "Deploying from: $(pwd)"
            git remote set-url origin "$REPO_URL" || true
            git fetch origin master
            git reset --hard origin/master
            npm ci --omit=dev

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2 || sudo npm install -g pm2
            fi

            if pm2 describe jigsaw >/dev/null 2>&1; then
              pm2 restart jigsaw --update-env
            else
              pm2 start server.js --name jigsaw
            fi

            pm2 save
