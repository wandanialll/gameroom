name: Deploy to DigitalOcean

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_KEY_PASSPHRASE }}
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_PATH }}"

            if [ -n "$APP_DIR" ] && [ -d "$APP_DIR" ]; then
              cd "$APP_DIR"
            elif [ -d "/home/jigsaw/jigsaw" ]; then
              cd "/home/jigsaw/jigsaw"
            elif [ -d "/root/jigsaw" ]; then
              cd "/root/jigsaw"
            else
              echo "No valid app directory found. Checked DEPLOY_PATH, /home/jigsaw/jigsaw, /root/jigsaw"
              echo "Current user: $(whoami)"
              echo "Home: $HOME"
              ls -la "$HOME"
              exit 1
            fi

            echo "Deploying from: $(pwd)"
            git fetch origin master
            git reset --hard origin/master
            npm ci --omit=dev
            pm2 restart jigsaw
            pm2 save
